<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Producto</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="dashboard">

    <aside class="sidebar">
        <h2>Velvet Beauty</h2>
        <ul>
            <li><a href="/admin/dashboard">Dashboard</a></li>
            <li><a href="/admin/products">Productos</a></li>
            <li><a href="/admin/add-product">Agregar Producto</a></li>
        </ul>
    </aside>

    <main class="main-content">

        <div class="admin-container" style="width:100%; max-width:650px; margin:0 auto;">

            <h1>Editar Producto</h1>

            <form action="/update-product/{{ product[0] }}"
                  method="POST"
                  enctype="multipart/form-data">

                <input type="text" name="name"
                       value="{{ product[1] }}"
                       placeholder="Nombre del producto" required>

                <input type="text" name="brand"
                       value="{{ product[2] }}"
                       placeholder="Marca" required>

                <textarea name="description"
                          placeholder="Descripción">{{ product[3] }}</textarea>

                <input type="number" step="0.01" name="price"
                       value="{{ product[4] }}"
                       placeholder="Precio" required>

                <input type="number" name="stock"
                       value="{{ product[5] }}"
                       placeholder="Stock" required>

                <select name="category_id">
                    {% for category in categories %}
                    <option value="{{ category[0] }}"
                        {% if category[0] == product[6] %}selected{% endif %}>
                        {{ category[1] }}
                    </option>
                    {% endfor %}
                </select>

                <p style="color:#777; font-size:14px;">
                    Imagen actual: <strong>{{ product[7] }}</strong><br>
                    Deja vacío para mantenerla.
                </p>

                <input type="file" name="image">

                <button type="submit">Guardar cambios</button>

            </form>

        </div>

    </main>

</div>

</body>
</html>
