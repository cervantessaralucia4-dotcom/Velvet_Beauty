<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agregar Producto</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <div class="admin-container">

        <h1>Agregar Producto</h1>

        <form 
        action="/save-product"
        method="post"
        enctype="multipart/form-data">

        <input type="text"
               name="name"
               placeholder="Nombre del producto"
               required>

        <input type="text"
               name="brand"
               placeholder="Marca"
               required>
        
        <textarea
            name="description"
            placeholder="Descripcion"
        ></textarea>

        <input type="number"
               step="0.01"
               name="price"
               placeholder="Precio"
               required>

        <input type="number"
               name="stock"
               placeholder="Stock"
               required>

        <select name="category_id">

            {% for category in categories %}

            <option value="{{ category[0] }}">
                {{ category[1] }}
            </option>

            {% endfor %}

        </select>

        <input type="file"
               name="image"
               required>

        <button type="submit">
            Guardar Producto
        </button>
        
    </form>
    </div>
    
</body>
</html>
