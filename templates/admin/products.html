<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Productos</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="dashboard">

    <!-- SIDEBAR -->

    <aside class="sidebar">

        <h2>GlowMart</h2>

        <ul>

            <li>
                <a href="/admin/dashboard">
                    Dashboard
                </a>
            </li>

            <li>
                <a href="/admin/products">
                    Productos
                </a>
            </li>

            <li>
                <a href="/admin/add-product">
                    Agregar Producto
                </a>
            </li>

        </ul>

    </aside>

    <!-- MAIN -->

    <main class="main-content">

        <div class="products-header">

            <h1>Productos</h1>

            <a href="/admin/add-product"
               class="add-btn">

                + Nuevo Producto

            </a>

        </div>

        <!-- TABLA -->

        <div class="products-table">

            <table>

                <thead>

                    <tr>

                        <th>Imagen</th>
                        <th>Nombre</th>
                        <th>Marca</th>
                        <th>Categoría</th>
                        <th>Precio</th>
                        <th>Stock</th>
                        <th>Acciones</th>

                    </tr>

                </thead>

                <tbody>

                    {% for product in products %}

                    <tr>

                        <td>

                            <img
                            class="table-image"

                            src="{{ url_for('static',
                            filename=product[5]) }}">

                        </td>

                        <td>{{ product[1] }}</td>

                        <td>{{ product[2] }}</td>

                        <td>{{ product[6] }}</td>

                        <td>${{ product[3] }}</td>

                        <td>{{ product[4] }}</td>

                        <td>

                            <a href="#"
                               class="edit-btn">

                                Editar

                            </a>

                            <a href="#"
                               class="delete-btn">

                                Eliminar

                            </a>

                        </td>

                    </tr>

                    {% endfor %}

                </tbody>

            </table>

        </div>

    </main>

</div>

</body>

</html>
